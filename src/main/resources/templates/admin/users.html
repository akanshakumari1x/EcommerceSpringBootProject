<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>

<body>
	<section>
	<div class="container-fluid mt-5 p-5">
				<div class="card card-sh">
					<div class="card-header text-center">
						<p class="fs-4" th:if="${userType==1}">Users</p>
						<p class="fs-4" th:if="${userType==2}">Admin</p>
						<th:block th:if ="${session.successMsg}">
							<p class="text-success fw-bold"> [[${session.successMsg}]]</p>
							<th:block th:text ="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>
							
							<th:block th:if ="${session.errorMsg}">
							<p class="text-danger fw-bold"> [[${session.errorMsg}]]</p>
							<th:block th:text ="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>
					</div>
					<div class="card-body">
						<table class="table">
							<thead>
								<tr>
									<th scope="col">Sl No</th>
									<th scope="col">Profile</th>
									<th scope="col">Name</th>
									<th scope="col">Email</th>
									<th scope="col">Mobile Number</th>
									<th scope="col">Address</th>
									<th scope="col">Status</th>
									<th scope="col">Action</th>
								</tr>
							</thead>
							<tbody>
							<tr th:each="p,c:${users}">
								<th scope="row">[[${c.count}]]</th>
								<td><img th:src="@{'/img/profile_img/'+${p.profileImage}}" width="50px" height="50px" ></td>
								<td>[[${p.name}]]</td>
								<td>[[${p.email}]]</td>
								<td>[[${p.mobileNumber}]]</td>
								<td>[[${p.address+' ,'+p.city+','+p.state+','+p.pincode}]]</td>
								<td>[[${p.isEnable}]]</td>
								<td>
									<a th:href="@{'/admin/updateSts?status=true&id='+${p.id}}+'&type='+${userType}" class="btn btn-primary">Active</a>
									<a th:href="@{'/admin/updateSts?status=false&id='+${p.id}}+'&type='+${userType}" class="btn btn-danger">InActive</a>
								</td>
							</tr>
						   </tbody>
						</table>
					</div>
				</div>
			</div>
</section>


</body>
</html>
