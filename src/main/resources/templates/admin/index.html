<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login Page</title>
	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
	<link rel="stylesheet" href="alert/dist/sweetalert.css">
	<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section>
	<div class="container p-5">
		<p class="text-center fs-3 mt-4">Admin Dashboard</p>
		<div class="row p-5">
			<div class="col-md-4  mt-2">
			<a href ="/admin/loadAddProduct" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				      <i class="fa-solid fa-square-plus fa-3x text-primary"></i>
						<h4> Add Product</h4>
					</div>
				</div>
				</a>
			</div>
			
			<div class="col-md-4 mt-2">
			<a href ="/admin/category" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				       <i class="fa-solid fa-list fa-3x text-primary"></i>
						<h4> Add Category</h4>
					</div>
				</div>
				</a>
			</div>
			
			<div class="col-md-4 mt-2">
			<a href ="/admin/products" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				       <i class="fa-solid fa-table-list  fa-3x text-primary"></i>
						<h4> View Product</h4>
					</div>
				</div>
				</a>
			</div>
			
			<div class="col-md-4 mt-2">
			<a href ="/admin/orders" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				       <i class="fa-solid fa-box-open fa-3x text-primary"></i>
						<h4> Orders </h4>
					</div>
				</div>
				</a>
			</div>
			
			<div class="col-md-4 mt-2">
			<a href ="/admin/users?type=1" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				       <i class="fa-solid fa-circle-user fa-3x text-primary"></i>
						<h4> Users</h4>
					</div>
				</div>
				</a>
			</div>
			
			<div class="col-md-4 mt-2">
			<a href ="/admin/add-admin" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				       <i class="fa-solid fa-user-plus fa-3x text-primary"></i>
						<h4> Add Admin</h4>
					</div>
				</div>
				</a>
			</div>
			
			<div class="col-md-4 mt-2">
			<a href ="/admin/users?type=2" class="text-decoration-none">
				<div class="card card-sh">
					<div class="card-body text-center">
				       <i class="fa-solid fa-user-plus fa-3x text-primary"></i>
						<h4>Admin</h4>
					</div>
				</div>
				</a>
			</div>
			
				
		</div>
	</div>
</section>

</body>
</html>
