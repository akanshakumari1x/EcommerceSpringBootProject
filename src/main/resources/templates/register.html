<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login Page</title>
	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
	<link rel="stylesheet" href="alert/dist/sweetalert.css">
	<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<section>
		<div class="container mt-5 p-5">
			<div class="row">
			<div class="col-md-5 p-5">
				<img src="img/ecom.png" width="100%" height="400px">
			</div>
			<div class="col-md-7  mt-1 p-2">
				<div class="card shadow p-2 mb-3 bg-body rounded">
					<div class="card-header">
						<p class="fs-2 text-center">Register</p> 
						
						 <th:block th:if ="${session.successMsg}">
							<p class="text-success fw-bold"> [[${session.successMsg}]]</p>
							<th:block th:text ="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>
							
							<th:block th:if ="${session.errorMsg}">
							<p class="text-danger fw-bold"> [[${session.errorMsg}]]</p>
							<th:block th:text ="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>
					 </div>
						<div class="card-body">
							<form action="/saveUser" method="post" id="userRegister" novalidate enctype="multipart/form-data" class="mx-auto" style="max-width: 400px;">
								<div class="row">
								<div class="col">
									<label for="name">Full Name:</label>
									<input type="text" id="username" name="name" class="form-control" required>
								</div>
								<div class="col">
									<label for="name">Mobile:</label>
									<input type="number" id="usermobile" name="mobileNumber" class="form-control" required>
								</div>
								</div>
								<div class="mb-3">
									<label for="name">Email:</label>
									<input type="text" id="useremail" name="email" class="form-control" required>
								</div>
								<div class="row">
									<div class="col">
										<label for="name">Address:</label>
										<input type="text" id="useraddress" name="address" class="form-control" required>
									</div>
									<div class="col">
										<label for="name">City:</label>
										<input type="text" id="usercity" name="city" class="form-control" required>
									</div>
								</div>
								<div class="row">
									<div class="col">
										<label for="name">State:</label>
										<input type="text" id="userstate" name="state" class="form-control" required>
									</div>
									<div class="col">
										<label for="name">Pincode:</label>
										<input type="number" id="pincode" name="pincode" class="form-control" required>
									</div>
								</div>
								<div class="row">
									<div class="col">
										<label for="name">Password:</label>
										<input type="password" id="pass" name="password" class="form-control" required>
									</div>
									<div class="col">
										<label for="name">Confirm Password:</label>
										<input type="password" name="confirmpassword" class="form-control" required>
									</div>
								</div>
								<div class="mb-3">
									<label class="form-label">Profile Image</label> <input
										class="form-control" name="img" type="file">
								</div>
								
								<div class="form-group text-center">
									<button type="submit" class="btn btn-primary btn-lg btn-block">Register</button>
								</div>
							</form>
						</div>
						
						<div class="card-footer text-center">
							Already have an account ? <a href="login">Login</a>
						</div>

					</div>
                  </div>
				</div>
			</div>

	</section>


</body>
