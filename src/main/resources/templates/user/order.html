<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login Page</title>
	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
	<link rel="stylesheet" href="alert/dist/sweetalert.css">
	<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	<section>
		<div class="container mt-5 p-5">
			<form action="/user/save-order" method="post" id="orders" novalidate>
			<div class="row">
			
				<div class="col-md-6">
				 
				   <div class="mb-3 row">
				   <p class="text-center fs-2">Billing Address </p>
				   <hr>
					<div class="col p-1"><label>First Name</label>
					      <input type="text" name="firstName" class="form-control mt-1" required>
					     </div>
					     <div class="col p-1"><label>Last Name</label>
					       <input type="text" name="lastName" class="form-control mt-1" required>
					     </div>
				    </div>
				   
				   <div class="mb-3 row">
					    <div class="col p-1"><label>Email</label>
					      <input type="email" name="email" class="form-control mt-1" required>
					    </div>
					    <div class="col p-1"><label>Mobile No</label>
					      <input type="text" name="mobileNo"  class="form-control mt-1" required>
					   </div>
				   </div>
				   
				   <div class="mb-3 row">
					    <div class="col p-1"><label>Address</label>
				          <input type="text" name="address"  class="form-control mt-1" required>
				        </div>
					    <div class="col p-1"><label>City</label>
				          <input type="text" name="city"  class="form-control mt-1" required>
				       </div>
				   </div>
				   
				   <div class="mb-3 row">
					    <div class="col p-1"><label>State</label>
					      <input type="text" name="state" class="form-control mt-1" required>
					     </div>
					  <div class="col p-1"><label>Pincode</label>
					     <input type="number" name="pincode"  class="form-control mt-1" required>
					   </div>
				    </div>
				    
				<!-- </form>-->
				 
				</div>
				
				
				<div class="col-md-6">
				 <p class="text-center fs-2">Payment Type </p>
				 <hr>
				 <div class="card">
				   <div class="card-body">
				     <table class="table table-borderless">
				        <tbody>
					        <tr>
					          <td> Total price </td>
					          <td>:</td>
					          <td>&#8377;[[${orderPrice}]]</td>
					        </tr>
					        <tr>
					          <td> Delivery Fee </td>
					           <td>:</td>
					          <td>&#8377; 698 </td>
					        </tr>
					        <tr>
					          <td> Tax </td>
					           <td>:</td>
					          <td>&#8377; 100</td>
					        </tr>
					        <tr class="border-top">
					          <td> Total Price </td>
					           <td>:</td>
					          <td>&#8377; [[${totalOrderPrice}]]</td>
					        </tr>
				        
				        </tbody>
				     </table>
				   </div>
				 </div>
				 
					<div class="card shadow p-3 mb-5 mt-2 bg-body-tertiary rounded">	
						<div class="card-body">
							<!--<form action="/login" method="post">-->
								<div class="mb-3">
									<label class="form-label">Select Payment Type</label>
									<select name="paymentType" class="form-control">
									  <option>--select--</option>
									    <option value="COD">Cash On Delivery</option>
									    <option value="ONLINE">Online Payment</option>
									</select>
								</div>

								<button class="btn bg-primary text-white col-md-12">Place Order</button>
							<!--</form>-->
						</div>

					</div>
				</div>
				
			</div>
			</form>
		</div>
	</section>
	
</body>
</html>
