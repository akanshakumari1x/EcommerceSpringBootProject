<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:fragment="layout(content)">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login Page</title>
	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
	integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
	
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>

	<!--start navBar-->
	<nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-primary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Navbar</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto mb-2 mb-lg-0">
				<th:block th:if="${user==null}">
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/">Home</a>
					</li>
				</th:block>
					
				<th:block th:unless="${user==null}">
					<li class="nav-item" th:if="${user.role=='ROLE_ADMIN'}">
						<a class="nav-link active" aria-current="page" href="/admin/">Home</a>
					</li>
					
					<li class="nav-item" th:if="${user.role=='ROLE_USER'}">
						<a class="nav-link active" aria-current="page" href="/">Home</a>
					</li>
					
				 </th:block>
					
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/products">Product</a>
					</li>
					
					<li class="nav-item dropdown"><a
						class="nav-link dropdown-toggle" href="#" role="button"
						data-bs-toggle="dropdown" aria-expanded="false"> Category </a>
						<ul class="dropdown-menu">
							<li th:each="c:${category}"><a class="dropdown-item" 
							th:href="@{'/products?category='+${c.name}}">[[${c.name}]]</a></li>
				       </ul></li>
					</ul>
					
				<ul class="navbar-nav ms-auto mb-2 mb-lg-0">
					 <th:block th:if ="${user == null}">
							<li class="nav-item"><a class="nav-link active"
								aria-current="page" href="/signin"><i
									class="fa-solid fa-right-to-bracket"></i> LOGIN</a></li>
							<li class="nav-item"><a class="nav-link active"
								aria-current="page" href="/register">REGISTER</a></li>
								
						     <li class="nav-item"><a class="nav-link active"
							aria-current="page" href="#">ADMIN</a></li>		

					</th:block>	
						
				  <th:block th:if ="${user!=null}">	
				  
				  <th:block th:if ="${user.role =='ROLE_USER'}">
				    	<li class="nav-item"><a class="nav-link active"
							aria-current="page" href="/user/cart">
							<i class="fa-solid fa-cart-arrow-down"></i> Cart[ [[${countCart}]] ]</a></li>
						</th:block>	
						
					 <li class="nav-item dropdown"><a class="nav-link dropdown-toggle active"
					      href="#" role="button"
						data-bs-toggle="dropdown" aria-expanded="false"> <i class="fa-solid fa-user">
							</i> [[${user.name}]] </a>
							
					     <ul class="dropdown-menu">
							<li th:if="${user.role=='ROLE_USER'}" >
							<a class="dropdown-item" href="/user/profile">Profile</a></li>
							
							<li th:if="${user.role=='ROLE_ADMIN'}" >
							<a class="dropdown-item" href="/admin/profile">Profile</a></li>

							<li th:if="${user.role=='ROLE_USER'}">
							<a class="dropdown-item" href="/user/user-orders">My Orders</a></li>
							
							<li><a class="dropdown-item" href="/logout">Logout</a></li>
							<li><hr class="dropdown-divider"></li></ul>
						  </li> 
						    
						<!--<li class="nav-item"><a class="nav-link active"
							aria-current="page" href="/logout"><i class="fa-solid fa-right-to-bracket">
						</i> Logout</a></li>-->
						
					</th:block>	
				</ul>
			</div>
		</div>
	</nav>
	<!--end navBar-->
	
	<!--section start here-->
	
      <div th:replace="${content}"></div>

	<!--section end here-->
	
	<!-- Start Footer -->
	<div class="container-fluid p-1 bg-primary text-center text-white"
		style="margin-top: 250px">
		<p>ecom.com</p>
	</div>
	<!-- End Footer  -->
	
	<!--JQuery validation start-->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.js"></script>
	
	<script type="text/javascript" src="/js/script.js"></script>
	
	<!--JQuery validation end-->
	
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous">
		</script>
	
	</body>
	</html>
